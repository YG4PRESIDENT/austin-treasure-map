<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#c4883c">
  <meta name="description" content="Yahir's curated Austin treasure map — 85+ hidden gems, food spots, nature, nightlife, and quirky finds.">
  <title>Austin Treasure Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Locate Control CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.81.1/dist/L.Control.Locate.min.css" />
  <!-- Fullscreen CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.fullscreen@3.0.2/Control.FullScreen.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="loading-compass"></div>
    <div class="loading-text">Charting treasures…</div>
  </div>

  <div id="app">

    <!-- ─── Left Navigation Sidebar (desktop) ─── -->
    <nav id="nav-sidebar">
      <div class="nav-sidebar__scroll">

        <!-- Title -->
        <div class="nav-sidebar__header">
          <h1 class="nav-sidebar__title">☠ YAHIR'S AUSTIN<br>TREASURE MAP</h1>
        </div>

        <!-- Search -->
        <div class="nav-sidebar__search">
          <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Search treasures…" autocomplete="off">
          </div>
          <div id="search-results" class="search-results"></div>
        </div>

        <!-- Category Group Buttons -->
        <div id="filter-bar" class="nav-sidebar__filters"></div>

        <!-- Progress Ring -->
        <div class="nav-sidebar__progress" id="progress-section">
          <svg class="progress-ring" viewBox="0 0 120 120">
            <circle class="progress-ring__track" cx="60" cy="60" r="52" />
            <circle class="progress-ring__fill" id="progress-ring-fill" cx="60" cy="60" r="52" />
          </svg>
          <div class="progress-ring__label">
            <span class="progress-ring__count" id="progress-count">0</span>
            <span class="progress-ring__total">/ 85</span>
            <span class="progress-ring__text">discovered</span>
          </div>
        </div>

        <!-- Quest Card -->
        <div id="quest-container" class="nav-sidebar__quest"></div>

        <!-- Footer Actions -->
        <div class="nav-sidebar__footer">
          <button class="nav-btn" id="share-btn">📤 Share</button>
          <button class="nav-btn" id="export-btn">💾 Export</button>
          <button class="nav-btn" id="import-btn">📂 Import</button>
        </div>

      </div>
    </nav>

    <!-- ─── Map Area ─── -->
    <main id="map-area">
      <div id="map"></div>

      <!-- Map Style Picker (floating on map, desktop only) -->
      <div class="style-picker style-picker--floating">
        <button class="style-picker__btn" data-layer="🗺️ Treasure Map">🗺️ Map</button>
        <button class="style-picker__btn" data-layer="⛰️ Explorer Map">⛰️ Topo</button>
        <button class="style-picker__btn" data-layer="🏙️ City Map">🏙️ City</button>
        <button class="style-picker__btn" data-layer="🌙 Dark Mode">🌙 Dark</button>
        <button class="style-picker__btn" data-layer="🛰️ Satellite">🛰️ Sat</button>
      </div>

      <!-- Mobile category chips (visible only on mobile Map tab) -->
      <div id="mobile-filter-chips" class="mobile-filter-chips"></div>
    </main>

    <!-- ─── Detail Panel (overlays nav on desktop, bottom sheet on mobile) ─── -->
    <aside id="detail-panel" aria-hidden="true">
      <button id="detail-close" class="detail-panel__close">✕</button>
      <div class="detail-panel__content">
        <h2 id="detail-name" class="detail-panel__name"></h2>
        <div class="detail-panel__tags">
          <span id="detail-category" class="detail-tag detail-tag--category"></span>
          <span id="detail-neighborhood" class="detail-tag detail-tag--neighborhood"></span>
          <span id="detail-daytrip" class="detail-tag detail-tag--daytrip"></span>
        </div>
        <p id="detail-description" class="detail-panel__description"></p>
        <p id="detail-source" class="detail-panel__source"></p>
        <a id="detail-address" class="detail-panel__address" href="#" target="_blank" rel="noopener"></a>
        <button id="detail-visited-btn" class="detail-panel__visited-btn">☐ Mark as Discovered</button>
        <div id="detail-notes-section" class="detail-panel__notes">
          <label class="notes-label" for="detail-notes">Personal Notes</label>
          <textarea id="detail-notes" placeholder="Your thoughts, tips, review…"></textarea>
        </div>
      </div>
    </aside>

    <!-- ─── Mobile Bottom Tabs (hidden on desktop) ─── -->
    <div id="mobile-tabs" class="mobile-tabs"></div>

    <!-- ─── Mobile Tab Panels (hidden on desktop) ─── -->
    <div id="mobile-panels" class="mobile-panels">
      <div class="mobile-panel" data-panel="search">
        <div class="mobile-panel__header">
          <h2>Search Treasures</h2>
        </div>
        <div class="mobile-panel__body">
          <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="mobile-search-input" placeholder="Search treasures…" autocomplete="off">
          </div>
          <div id="mobile-search-results" class="mobile-search-results"></div>
        </div>
      </div>

      <div class="mobile-panel" data-panel="quests">
        <div class="mobile-panel__header">
          <h2>Quests & Mastery</h2>
        </div>
        <div class="mobile-panel__body">
          <div id="mobile-quest-container"></div>
          <div id="mobile-mastery-list" class="mastery-list"></div>
        </div>
      </div>

      <div class="mobile-panel" data-panel="profile">
        <div class="mobile-panel__header">
          <h2>Your Journey</h2>
        </div>
        <div class="mobile-panel__body">
          <div id="mobile-progress-section" class="mobile-progress-section"></div>
          <!-- Map Style Picker (mobile) -->
          <div class="style-picker style-picker--mobile">
            <div class="style-picker__label">Map Style</div>
            <div class="style-picker__grid">
              <button class="style-picker__btn" data-layer="🗺️ Treasure Map">🗺️ Map</button>
              <button class="style-picker__btn" data-layer="⛰️ Explorer Map">⛰️ Topo</button>
              <button class="style-picker__btn" data-layer="🏙️ City Map">🏙️ City</button>
              <button class="style-picker__btn" data-layer="🌙 Dark Mode">🌙 Dark</button>
              <button class="style-picker__btn" data-layer="🛰️ Satellite">🛰️ Sat</button>
            </div>
          </div>
          <div class="mobile-profile-actions">
            <button class="nav-btn" id="mobile-share-btn">📤 Share</button>
            <button class="nav-btn" id="mobile-export-btn">💾 Export</button>
            <button class="nav-btn" id="mobile-import-btn">📂 Import</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Locate Control -->
  <script src="https://unpkg.com/leaflet.locatecontrol@0.81.1/dist/L.Control.Locate.min.js"></script>
  <!-- Fullscreen -->
  <script src="https://unpkg.com/leaflet.fullscreen@3.0.2/Control.FullScreen.js"></script>

  <!-- App JS (ES Modules) -->
  <script type="module" src="js/app.js"></script>

  <!-- Service Worker Registration (with force update) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        // Force check for updates on every page load
        reg.update();
        // When a new SW is installed, reload to pick up new assets
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          if (newSW) {
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
                window.location.reload();
              }
            });
          }
        });
      }).catch(() => {});
    }
  </script>
</body>
</html>
